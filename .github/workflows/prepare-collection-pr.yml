name: Prepare FrancoStino Collection PR
on:
  workflow_dispatch:
    inputs:
      date_added:
        description: Date override (YYYY-MM-DD, leave empty for today)
        required: false
        type: string

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_PAT }}
    steps:
      - uses: actions/checkout@v6
        with:
          path: source

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - run: pip install pyyaml

      - name: Fork and clone collection repo
        run: |
          collection_dir="${{ runner.temp }}/collection-repo"
          owner="${{ github.repository_owner }}"

          # Fork (no-op if already exists, --default-branch-only is faster)
          gh repo fork FrancoStino/opencode-skills-collection \
            --default-branch-only 2>/dev/null || true

          # Clone the fork (fall back to upstream if fork somehow missing)
          if ! gh repo clone "$owner/opencode-skills-collection" "$collection_dir" 2>/dev/null; then
            echo "Fork not found, cloning upstream directly"
            git clone \
              "https://github.com/FrancoStino/opencode-skills-collection.git" \
              "$collection_dir"
          fi

          cd "$collection_dir"
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git remote add upstream \
            https://github.com/FrancoStino/opencode-skills-collection.git \
            2>/dev/null || true
          echo "collection_dir=$collection_dir" >> "$GITHUB_OUTPUT"
        id: collection

      - name: Copy skills to bundled-skills
        run: |
          cd "${{ steps.collection.outputs.collection_dir }}"
          mkdir -p bundled-skills
          for skill_dir in "${{ github.workspace }}/source/skills/"*/; do
            name="$(basename "$skill_dir")"
            [ "$name" = "*" ] && continue
            rm -rf "bundled-skills/$name"
            cp -r "$skill_dir" "bundled-skills/$name"
            echo "Copied: $name"
          done

      - name: Update skills_index.json
        run: |
          python "${{ github.workspace }}/source/scripts/update-collection-index.py" \
            "${{ steps.collection.outputs.collection_dir }}" \
            "${{ github.workspace }}/source/skills" \
            "${{ inputs.date_added || '' }}"

      - name: Commit and push
        run: |
          cd "${{ steps.collection.outputs.collection_dir }}"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi
          git commit -m "Sync skills from mskadu/opencode-agent-skills"
          # Embed PAT in remote URL so git push can authenticate
          git remote set-url origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY_OWNER}/opencode-skills-collection.git"
          git push origin HEAD:main --force

      - name: Write PR body
        run: |
          {
            echo "Automated sync from mskadu/opencode-agent-skills"
            echo ""
            echo "Skills synced:"
            sed 's/^/- /' "${{ github.workspace }}/source/SKILL_MANIFEST"
          } > /tmp/pr_body.md

      - name: Create or update Pull Request
        run: |
          body_content=$(cat /tmp/pr_body.md)
          response=$(gh api repos/FrancoStino/opencode-skills-collection/pulls \
            --field title="Sync skills from mskadu/opencode-agent-skills" \
            --field head="${{ github.repository_owner }}:main" \
            --field base=main \
            --field body="$body_content" \
            --jq '.html_url' 2>&1) || true

          if echo "$response" | grep -q "already_exists\|already exists"; then
            # PR exists — update the body
            pr_num=$(gh api repos/FrancoStino/opencode-skills-collection/pulls \
              --jq '.[0].number' \
              --method GET \
              --field head="${{ github.repository_owner }}:main" \
              --field base=main)
            gh api "repos/FrancoStino/opencode-skills-collection/pulls/$pr_num" \
              --method PATCH \
              --field body="$body_content" > /dev/null
            pr_url="https://github.com/FrancoStino/opencode-skills-collection/pull/$pr_num"
            echo "PR updated: $pr_url"
          else
            pr_url="$response"
            echo "PR created: $pr_url"
          fi
          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"
        id: pr
