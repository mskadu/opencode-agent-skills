name: Prepare GitHub Pages publish
on:
  workflow_dispatch:
    inputs:
      version:
        description: Version override (leave empty to use VERSION file)
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: source

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install pyyaml

      - name: Generate pages content
        run: python source/scripts/generate-index.py --output "$PWD/pages-dist"

      - name: Checkout gh-pages branch
        id: checkout-gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: pages-repo
        continue-on-error: true

      - name: Create gh-pages orphan branch if missing
        if: steps.checkout-gh-pages.outcome == 'failure'
        run: |
          mkdir -p pages-repo
          cd pages-repo
          git init -b gh-pages
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git commit --allow-empty -m "Initialize gh-pages branch"

      - name: Apply generated content
        run: |
          cd pages-repo
          # Remove all files except .git
          find . -maxdepth 1 -not -name '.git' -not -name '.' -exec rm -rf {} +
          # Copy generated content (preserves dotfiles like .nojekyll)
          rsync -a --quiet "${{ github.workspace }}/pages-dist/" .

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          path: pages-repo
          commit-message: "Update skills index"
          branch: publish/gh-pages
          base: gh-pages
          title: "Publish skills index"
          body: |
            Automated PR to update GitHub Pages content.

            Generated from `skills/` directory.
            See `SKILL_MANIFEST` for the list of published skills.

            Review the changes below before merging.
            After merge, GitHub Pages deploys automatically from the `gh-pages` branch.
